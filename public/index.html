<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>webSSHadmin - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0e1a;
      color: #e4e8f1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(0, 234, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 234, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 50% 50%, rgba(0, 234, 255, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .login-box {
      position: relative;
      background: rgba(13, 18, 36, 0.85);
      border: 1px solid rgba(0, 234, 255, 0.15);
      border-radius: 12px;
      padding: 48px 40px;
      width: 380px;
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 234, 255, 0.08);
      backdrop-filter: blur(20px);
      z-index: 1;
    }
    .login-box h1 {
      text-align: center;
      margin-bottom: 6px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00eaff 0%, #7b61ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-box p {
      text-align: center;
      color: rgba(180, 190, 210, 0.5);
      margin-bottom: 32px;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 1px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: rgba(180, 190, 210, 0.7);
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(15, 25, 50, 0.9);
      border: 1px solid rgba(0, 234, 255, 0.12);
      border-radius: 6px;
      color: #e4e8f1;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-group input:focus {
      border-color: #00eaff;
      box-shadow: 0 0 0 2px rgba(0, 234, 255, 0.1), 0 0 20px rgba(0, 234, 255, 0.15);
    }
    .form-group input::placeholder { color: rgba(130, 145, 170, 0.4); }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00eaff, #7b61ff);
      color: #0a0e1a;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 1px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover {
      box-shadow: 0 0 30px rgba(0, 234, 255, 0.4);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }
    .error {
      color: #ff3c78;
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      display: none;
    }
    .login-method-toggle {
      display: none;
      margin-bottom: 20px;
      text-align: center;
    }
    .login-method-toggle.visible { display: flex; gap: 0; }
    .login-method-toggle button {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(15, 25, 50, 0.9);
      border: 1px solid rgba(0, 234, 255, 0.12);
      color: rgba(180, 190, 210, 0.7);
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
    }
    .login-method-toggle button:first-child { border-radius: 6px 0 0 6px; }
    .login-method-toggle button:last-child { border-radius: 0 6px 6px 0; }
    .login-method-toggle button.active {
      background: rgba(0, 234, 255, 0.1);
      border-color: #00eaff;
      color: #00eaff;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>webSSHadmin</h1>
    <p>Web SSH Client</p>
    <div class="login-method-toggle" id="loginMethodToggle">
      <button type="button" id="btnMethodLocal" class="active">Lokal</button>
      <button type="button" id="btnMethodAD">Domaene</button>
    </div>
    <form id="loginForm">
      <input type="hidden" id="loginMethod" value="local">
      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username" placeholder="Benutzername" autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" placeholder="Passwort" autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Login</button>
      <div class="error" id="error"></div>
    </form>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
